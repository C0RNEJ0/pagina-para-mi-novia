<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti, Mi Amor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Variables de Color */
        :root {
            /* Degradado de fondo suave */
            --bg-gradient-start: #fdfafb; /* Rosa muy pastel casi blanco */
            --bg-gradient-end: #f4ebf4;   /* Lavanda suave pastel */
            
            /* Textos y Acentos */
            --text-dark: #5e4c5a;   /* Morado grisáceo oscuro */
            --text-light: #8a7385;
            --accent-color: #d8a7b1; /* Rosa viejo elegante */
            
            /* Efectos Glassmorphism */
            --card-bg: rgba(255, 255, 255, 0.5);
            --shadow-soft: 0 20px 50px rgba(94, 76, 90, 0.08);
            --shadow-hover: 0 25px 60px rgba(94, 76, 90, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            padding: 20px;
            overflow-x: hidden;
        }

        /* Contenedor Principal (Tarjeta Glassmorphism) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: var(--shadow-soft);
            text-align: center;
            transition: all 0.5s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-5px);
        }

        /* Tipografía */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #b887a2, #a1789c);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.02);
        }

        p.message {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-dark);
            margin-bottom: 35px;
            font-weight: 300;
            transition: opacity 1s ease-in-out;
            min-height: 70px; /* Para evitar que la tarjeta cambie de tamaño bruscamente */
        }

        p.message.fade-out {
            opacity: 0;
        }

        /* Galería Animada Collage */
        .gallery-container {
            width: 100%;
            height: 380px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .collage-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            background: #fff;
        }

        .collage-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 8s ease;
            transform: scale(1.05);
        }

        .collage-item img.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Controles de Música */
        .music-controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .music-player {
            width: 56px;
            height: 56px;
        }

        .music-next {
            width: 44px;
            height: 44px;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .music-btn svg {
            fill: #b887a2;
            transition: fill 0.3s ease;
        }

        .music-player svg { width: 22px; height: 22px; }
        .music-next svg { width: 18px; height: 18px; }

        /* Animación de ondas musicales (cuando reproduce) */
        .music-player.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(184, 135, 162, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(184, 135, 162, 0); }
            100% { box-shadow: 0 0 0 0 rgba(184, 135, 162, 0); }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .card { padding: 30px 20px; border-radius: 24px; }
            .gallery-container { height: 320px; }
            .music-controls { bottom: 20px; right: 20px; }
            .music-player { width: 50px; height: 50px; }
            .music-next { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Para Ti, Mi Amor</h1>
        <p class="message" id="poem-text">Eres mi lugar favorito, mi mayor alegría y la historia más hermosa que jamás imaginé escribir. Cada día contigo es un regalo.</p>
        
        <div class="gallery-container">
            <div class="collage-item">
                <img src="imagenes/20250605_102630.jpg" alt="Foto 1" class="active">
                <img src="" alt="Foto 1 Siguiente" class="next-image">
            </div>
            <div class="collage-item">
                <img src="imagenes/IMG_0748.jpg" alt="Foto 2" class="active">
                <img src="" alt="Foto 2 Siguiente" class="next-image">
            </div>
            <div class="collage-item">
                <img src="imagenes/IMG_20241014_074132.jpg" alt="Foto 3" class="active">
                <img src="" alt="Foto 3 Siguiente" class="next-image">
            </div>
            <div class="collage-item">
                <img src="imagenes/WhatsApp Image 2026-05-12 at 7.14.54 PM.jpeg" alt="Foto 4" class="active">
                <img src="" alt="Foto 4 Siguiente" class="next-image">
            </div>
        </div>
    </div>

    <!-- Controles de Música -->
    <div class="music-controls">
        <div class="music-btn music-player" id="play-btn" title="Reproducir / Pausar">
            <!-- Ícono de Play -->
            <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <!-- Ícono de Pause -->
            <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </div>
        <div class="music-btn music-next" id="next-btn" title="Siguiente Canción">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
        </div>
    </div>

    <!-- PEGA AQUÍ EL ENLACE DE TU CANCIÓN -->
    <audio id="bg-audio" loop autoplay>
        <source src="musica/Brillas.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Lógica de los Poemas Aleatorios
        const poems = [
            "Vanessa, eres mi lugar favorito, mi mayor alegría y la historia más hermosa que jamás imaginé escribir. Cada día contigo es un regalo.",
            "Si tuviera que volver a elegir, te elegiría a ti en cada una de mis vidas, mi hermosa Vanessa. Eres mi coincidencia más bella.",
            "Vanessa, no sé a dónde nos lleve la vida, pero espero que sea tomados de la mano. Eres todo lo que siempre soñé.",
            "Tus ojos son mi paisaje favorito y tu sonrisa el mejor de mis refugios. Te amo más de lo que las palabras pueden expresar, Vanessa.",
            "Contigo cada momento es poesía, Vanessa. Cada silencio es música y cada abrazo es mi hogar perfecto.",
            "Quédate conmigo siempre, Vanessa, porque contigo la vida es mucho más bonita. Eres el amor de mis días y mis noches.",
            "Me enamoré de ti sabiendo que nuestro amor iba a ser una aventura. Gracias por ser la luz que ilumina mi camino, mi amada Vanessa.",
            "Elegirte a ti fue la mejor decisión que he tomado. Vanessa, eres y siempre serás mi persona favorita.",
            "Vanessa, eres el sueño que nunca supe que tenía, y ahora no me imagino despertar sin ti a mi lado.",
            "Te quiero no por quién eres, sino por quién soy cuando estoy contigo, mi dulce Vanessa.",
            "Si el universo es infinito, mi amor por ti, Vanessa, es el universo entero concentrado en un latido.",
            "La vida tiene muchos colores, pero desde que te conocí, Vanessa, todos se ven más brillantes y hermosos.",
            "No importa cuántos obstáculos haya, siempre encontraré el camino de vuelta a tus brazos, mi preciosa Vanessa.",
            "Vanessa, tú eres la razón por la que mi corazón sonríe, incluso en los días más grises.",
            "Cada mensaje tuyo es como una caricia al alma. Te amo profundamente, Vanessa.",
            "Amo cada detalle de ti, Vanessa. Eres la obra de arte más perfecta que la vida me regaló.",
            "Vanessa, mi amor por ti crece con cada latido de mi corazón. Eres mi presente y mi futuro.",
            "No hay lugar en el mundo donde prefiera estar que a tu lado, mi hermosa Vanessa.",
            "Vanessa, me haces creer en la magia cada vez que me miras y me sonríes.",
            "Eres el tesoro más grande que la vida me ha dado, mi amada Vanessa. Te amo con toda mi alma."
        ];
        
        const poemText = document.getElementById('poem-text');
        
        function changePoem() {
            poemText.classList.add('fade-out');
            setTimeout(() => {
                let randomIndex = Math.floor(Math.random() * poems.length);
                // Evitar que se repita el mismo poema consecutivamente
                while(poems[randomIndex] === poemText.textContent) {
                    randomIndex = Math.floor(Math.random() * poems.length);
                }
                poemText.textContent = poems[randomIndex];
                poemText.classList.remove('fade-out');
            }, 1000); // Esperar el fade-out de CSS (1s)
        }

        // Cambiar el poema cada 8 segundos
        setInterval(changePoem, 8000);

        // Lógica de la Galería Animada (Collage aleatorio)
        const allUserImages = [
            "imagenes/117170376_1376496469406823_8072240687340670023_n.jpg",
            "imagenes/120700089_1430208677368935_7905494940818386581_n.jpg",
            "imagenes/126906285_1480954692294333_244055449148517610_n.jpg",
            "imagenes/130589899_1492156547840814_2912686362480927703_n.jpg",
            "imagenes/140759868_1525037817886020_4260831697068993057_n.jpg",
            "imagenes/189089895_1617663638623437_4870966453245684567_n.jpg",
            "imagenes/20250605_102630.jpg",
            "imagenes/471622992_2620396725016785_6069001143448839936_n.jpg",
            "imagenes/480781914_2686390105084113_7345203911638678231_n.jpg",
            "imagenes/482325948_2680660035657120_1034243175173854033_n.jpg",
            "imagenes/484869168_2685618471827943_3037574466680970296_n.jpg",
            "imagenes/484972720_2690599021329888_7751564619989323435_n.jpg",
            "imagenes/485339952_2691366571253133_2813699833319719637_n.jpg",
            "imagenes/486085626_2694613364261787_8666894684806044761_n.jpg",
            "imagenes/486748971_2694613557595101_179828777454502785_n.jpg",
            "imagenes/488207328_2702861240103666_635878118305927599_n.jpg",
            "imagenes/488803542_2708291416227315_1023688202938833341_n.jpg",
            "imagenes/502944001_2766299330426523_3940385920105860682_n.jpg",
            "imagenes/503351046_2766299250426531_5015238685965556871_n.jpg",
            "imagenes/58379484_971185066604634_1085653546428268544_n.jpg",
            "imagenes/597516084_2962062004183587_1090323166197507196_n.jpg",
            "imagenes/60968175_991409124582228_5851796497309368320_n.jpg",
            "imagenes/78999111_1148129242243548_522375367311228928_n.jpg",
            "imagenes/83182494_1201869800202825_1515477629845635072_n.jpg",
            "imagenes/87060654_1224466317943173_2584001493782757376_n.jpg",
            "imagenes/87265816_1222772331445905_2334623305891315712_n.jpg",
            "imagenes/87813961_1236627040060434_6782986372480237568_n.jpg",
            "imagenes/92136593_1261644377558700_7978127667599769600_n.jpg",
            "imagenes/92828122_1265102657212872_5417538710562406400_n.jpg",
            "imagenes/94037088_1276064012783403_6829891332362731520_n.jpg",
            "imagenes/EA8C7C51-B25C-4A2F-896B-BE4035BDBC9F.jpg",
            "imagenes/IMG-20250728-WA0044(1)(1).jpg",
            "imagenes/IMG-20250808-WA0036(1).jpg",
            "imagenes/IMG_0639.jpg",
            "imagenes/IMG_0748.jpg",
            "imagenes/IMG_1225.jpg",
            "imagenes/IMG_1341.jpg",
            "imagenes/IMG_1512.jpg",
            "imagenes/IMG_1554.jpg",
            "imagenes/IMG_20200608_181414207_HDR.jpg",
            "imagenes/IMG_20241014_074132.jpg",
            "imagenes/IMG_2337.jpg",
            "imagenes/IMG_2349.jpg",
            "imagenes/IMG_2367.jpg",
            "imagenes/IMG_2399.jpg",
            "imagenes/IMG_2507.jpg",
            "imagenes/IMG_2520.jpg",
            "imagenes/IMG_2713.jpg",
            "imagenes/IMG_2792.jpg",
            "imagenes/IMG_2853.jpg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.14.54 PM.jpeg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.18.16 PM.jpeg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.27.17 PM.jpeg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.39.14 PM.jpeg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.45.07 PM.jpeg",
            "imagenes/WhatsApp Image 2026-05-12 at 7.48.59 PM.jpeg",
            "imagenes/fa799d5c-fd65-409e-878f-6e3fae84b897.jpg"
        ];
        
        const collageItems = document.querySelectorAll('.collage-item');

        function changeRandomImage() {
            // Escoger un cuadro del collage aleatorio
            const randomItem = collageItems[Math.floor(Math.random() * collageItems.length)];
            const currentImg = randomItem.querySelector('img.active');
            const nextImg = randomItem.querySelector('img.next-image');
            
            // Obtener todas las imágenes actualmente en pantalla para evitar repetirlas
            // Usamos getAttribute('src') en lugar de .src para obtener la ruta relativa exactamente igual al array
            const visibleImages = Array.from(document.querySelectorAll('.collage-item img.active')).map(img => img.getAttribute('src'));
            
            // Filtrar las imágenes para elegir solo las que no se están mostrando ahora mismo
            const availableImages = allUserImages.filter(src => !visibleImages.includes(src));
            
            // Escoger una imagen aleatoria de las disponibles
            let newSrc;
            if (availableImages.length > 0) {
                newSrc = availableImages[Math.floor(Math.random() * availableImages.length)];
            } else {
                newSrc = allUserImages[Math.floor(Math.random() * allUserImages.length)];
            }
            
            nextImg.src = newSrc;
            
            // Intercambiar las clases suavemente
            nextImg.classList.add('active');
            nextImg.classList.remove('next-image');
            
            currentImg.classList.remove('active');
            currentImg.classList.add('next-image');
        }

        // Ejecutar el cambio de imagen con un intervalo aleatorio
        function scheduleNextImageChange() {
            // Tiempo aleatorio más rápido: entre 1500 ms (1.5s) y 4500 ms (4.5s)
            const randomDelay = Math.floor(Math.random() * (4500 - 1500 + 1)) + 1500;
            setTimeout(() => {
                changeRandomImage();
                scheduleNextImageChange();
            }, randomDelay);
        }
        
        // Iniciar el ciclo de cambios aleatorios de imágenes
        scheduleNextImageChange();

        // Lógica del Reproductor de Música
        const playlist = [
            "musica/Brillas.mp3",
            "musica/Beso.mp3",
            "musica/Chachachá.mp3",
            "musica/Labios Rotos (En Vivo Desde México  2010).mp3",
            "musica/MAGIC! - Rude (Official Video).mp3",
            "musica/Mi Buen Amor.mp3",
            "musica/San Lucas.mp3"
        ];
        let currentSongIndex = 0;

        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-btn');
        const nextBtn = document.getElementById('next-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        let isPlaying = false;

        function setPlayState() {
            isPlaying = true;
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            playBtn.classList.add('playing');
        }

        function playCurrentSong() {
            audio.src = playlist[currentSongIndex];
            audio.play().then(() => {
                setPlayState();
            }).catch(error => {
                console.log('Esperando interacción para reproducir...');
            });
        }

        // Siguiente canción automáticamente al terminar
        audio.addEventListener('ended', () => {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            playCurrentSong();
        });

        // Botón Siguiente
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            playCurrentSong();
        });

        // Intentar reproducir automáticamente
        window.addEventListener('load', () => {
            playCurrentSong();
            
            // Iniciar audio al primer clic si el autoplay fue bloqueado
            document.body.addEventListener('click', function initAudio() {
                if (!isPlaying) {
                    audio.play().then(() => setPlayState());
                }
                document.body.removeEventListener('click', initAudio);
            }, { once: true });
        });

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evitar que el click se propague al body
            if (isPlaying) {
                audio.pause();
                iconPause.style.display = 'none';
                iconPlay.style.display = 'block';
                playBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    setPlayState();
                }).catch(error => {
                    console.log('Error al reproducir audio.');
                });
            }
        });
    </script>
</body>
</html>
